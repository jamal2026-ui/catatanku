<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dompetku - Multi User</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fc; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #f7f9fc; position: relative; padding-bottom: 80px; }
        .bg-gradient-blue { background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%); }
        .hidden { display: none; }
    </style>
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div id="auth-container" class="fixed inset-0 bg-white z-50 flex items-center justify-center p-6 hidden">
    <div class="w-full max-w-sm space-y-4">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-blue-600">Dompetku</h2>
            <p class="text-gray-500">Masuk untuk melihat catatanmu</p>
        </div>
        <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 rounded-2xl border border-gray-200 outline-none focus:border-blue-500 transition">
        <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 rounded-2xl border border-gray-200 outline-none focus:border-blue-500 transition">
        <div class="flex gap-2">
            <button onclick="window.handleAuth('login')" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">MASUK</button>
            <button onclick="window.handleAuth('register')" class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold">DAFTAR</button>
        </div>
    </div>
</div>

<div id="main-app" class="app-container hidden">
    <div class="bg-gradient-blue p-6 text-white rounded-b-3xl shadow-lg relative">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h1 id="label-hari" class="text-xl font-bold uppercase tracking-wide">Memuat...</h1>
                <p id="label-tanggal" class="text-xs opacity-70">-- --- ----</p>
                <p id="user-display-name" class="text-xs mt-2 bg-white/10 px-2 py-0.5 rounded-full inline-block opacity-80">Memuat User...</p>
            </div>
            <button onclick="window.logout()" class="opacity-70 hover:opacity-100 text-[10px] border border-white/30 px-3 py-1.5 rounded-full transition whitespace-nowrap">Logout</button>
        </div>

        <p class="text-sm opacity-80 uppercase tracking-tighter">Total Saldo</p>
        <h2 id="total-saldo" class="text-4xl font-bold mt-1">Rp 0</h2>
    </div>

    <div class="p-4 mt-4 grid grid-cols-2 gap-4">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 hover:shadow-lg transition">
            <div class="bg-green-100 p-3 rounded-full text-green-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </div>
            <div>
                <p class="text-xs text-gray-400 uppercase">Pemasukan</p>
                <p id="total-pemasukan" class="text-green-600 font-bold text-lg">Rp 0</p>
            </div>
        </div>
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 hover:shadow-lg transition">
            <div class="bg-red-100 p-3 rounded-full text-red-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 20V4m0 0l-4 4m4-4l4 4"></path></svg>
            </div>
            <div>
                <p class="text-xs text-gray-400 uppercase">Pengeluaran</p>
                <p id="total-pengeluaran" class="text-red-600 font-bold text-lg">Rp 0</p>
            </div>
        </div>
    </div>

    <div class="p-4 space-y-4">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-gray-800">Analisis Bulan Ini</h3>
                <span id="label-bulan-analisis" class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg uppercase">---</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="w-32 h-32"><canvas id="myChart"></canvas></div>
                <div class="flex-1 space-y-2">
                    <div>
                        <p id="teks-terbanyak" class="text-xs text-gray-500">Menganalisa...</p>
                        <p id="nilai-terbanyak" class="text-sm font-bold text-red-600">Rp 0</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-gray-800">Catatan Terbaru</h3>
            </div>
            <div id="daftar-transaksi" class="space-y-3 min-h-[100px]">
                <p class="text-center text-gray-400 py-10">Memuat data dari cloud...</p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-[480px] p-4 z-10">
        <button onclick="window.bukaModal()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-xl hover:bg-blue-700 transition">
            + Catat Baru
        </button>
    </div>

    <div id="modal-form" class="fixed inset-0 bg-black/50 z-20 flex items-center justify-center p-4 hidden">
        <div class="bg-white p-6 rounded-3xl w-full max-w-[380px] space-y-4">
            <h4 class="text-lg font-bold text-gray-800">Tambah Transaksi</h4>
            <input type="number" id="nominal" placeholder="Nominal Rp" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
            <input type="text" id="keterangan" placeholder="Keterangan" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
            <div class="flex gap-2">
                <button onclick="window.tambahKeCloud('pemasukan')" class="flex-1 bg-green-500 text-white py-4 rounded-2xl font-bold hover:bg-green-600">MASUK</button>
                <button onclick="window.tambahKeCloud('pengeluaran')" class="flex-1 bg-red-500 text-white py-4 rounded-2xl font-bold hover:bg-red-600">KELUAR</button>
            </div>
            <button onclick="window.tutupModal()" class="w-full text-center text-gray-400 py-2 text-sm">Batal</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAp-NRtvMwmC61OhYgFMjmU3-93mDMbc4k",
        authDomain: "dompetku-5387c.firebaseapp.com",
        projectId: "dompetku-5387c",
        storageBucket: "dompetku-5387c.firebasestorage.app",
        messagingSenderId: "1064193223000",
        appId: "1:1064193223000:web:a98bc529932323b02d5d2d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let transaksi = [];
    let myChart = null;
    let currentUser = null;
    let unsubscribe = null;

    // AUTH HANDLER
    window.handleAuth = async (mode) => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        if (!email || !pass) return alert("Isi email & password!");
        try {
            if (mode === 'login') await signInWithEmailAndPassword(auth, email, pass);
            else await createUserWithEmailAndPassword(auth, email, pass);
        } catch (e) { alert("Auth Error: " + e.message); }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            // Menampilkan email user di header
            document.getElementById('user-display-name').innerText = user.email;
            startListening(user.uid);
        } else {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
            if (unsubscribe) unsubscribe();
        }
    });

    // LISTENER DATA BERDASARKAN USER
    function startListening(uid) {
        // Query hanya mengambil data milik user yang sedang login
        const q = query(collection(db, "transaksi"), where("userId", "==", uid), orderBy("createdAt", "desc"));
        unsubscribe = onSnapshot(q, (snap) => {
            transaksi = snap.docs.map(doc => ({ ...doc.data(), firestoreId: doc.id }));
            updateTampilan();
        }, (error) => { console.log("Firebase Error: " + error); });
    }

    window.tambahKeCloud = async (tipe) => {
        const nom = document.getElementById('nominal').value;
        const ket = document.getElementById('keterangan').value;
        if (!nom || !ket) return alert("Isi nominal & keterangan!");

        await addDoc(collection(db, "transaksi"), {
            userId: currentUser.uid, // Simpan ID User
            tipe,
            nominal: parseInt(nom),
            keterangan: ket,
            tanggal: new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' }),
            createdAt: new Date() // Digunakan untuk mengurutkan transaksi
        });
        window.tutupModal();
    };

    window.hapusDariCloud = async (firestoreId) => {
        if (confirm("Hapus catatan ini?")) {
            await deleteDoc(doc(db, "transaksi", firestoreId));
        }
    };

    function updateTampilan() {
        const daftar = document.getElementById('daftar-transaksi');
        let masuk = 0, keluar = 0;
        daftar.innerHTML = '';
        
        if (transaksi.length === 0) { daftar.innerHTML = '<p class="text-center text-gray-400 py-10">Belum ada catatan.</p>'; }

        transaksi.forEach((item, idx) => {
            if(item.tipe === 'pemasukan') masuk += item.nominal;
            else keluar += item.nominal;
            // Tampilkan hanya 5 transaksi terbaru
            if(idx < 5) {
                const warna = item.tipe === 'pemasukan' ? 'text-green-600' : 'text-red-600';
                daftar.innerHTML += `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center mb-3">
                    <div><p class="font-medium text-gray-800">${item.keterangan}</p><p class="text-xs text-gray-400">${item.tanggal}</p></div>
                    <div class="flex items-center gap-3">
                        <p class="${warna} font-bold">${item.tipe === 'pemasukan' ? '+' : '-'} ${formatRupiah(item.nominal)}</p>
                        <button onclick="window.hapusDariCloud('${item.firestoreId}')" class="text-gray-300 hover:text-red-500 hover:bg-gray-50 p-1.5 rounded-fullTransition">×</button>
                    </div>
                </div>`;
            }
        });
        document.getElementById('total-saldo').innerText = formatRupiah(masuk - keluar);
        document.getElementById('total-pemasukan').innerText = formatRupiah(masuk);
        document.getElementById('total-pengeluaran').innerText = formatRupiah(keluar);
        updateHeaderTime();
        renderChart(masuk, keluar);
    }

    function formatRupiah(n) { return 'Rp ' + n.toLocaleString('id-ID'); }
    function updateHeaderTime() {
        const d = new Date();
        document.getElementById('label-hari').innerText = new Intl.DateTimeFormat('id-ID', { weekday: 'long' }).format(d);
        document.getElementById('label-tanggal').innerText = new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }).format(d);
    }
    function renderChart(m, k) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { datasets: [{ data: (m+k === 0) ? [1] : [m, k], backgroundColor: (m+k === 0) ? ['#f3f4f6'] : ['#22c55e', '#ef4444'], borderWidth: 0 }] },
            options: { cutout: '75%', plugins: { legend: { display: false } } }
        });
    }

    window.bukaModal = () => document.getElementById('modal-form').classList.remove('hidden');
    window.tutupModal = () => {
        document.getElementById('modal-form').classList.add('hidden');
        document.getElementById('nominal').value = '';
        document.getElementById('keterangan').value = '';
    }

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
