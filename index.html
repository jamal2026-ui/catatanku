<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dompetku - Catatan Keuangan Jamal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fc; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #f7f9fc; position: relative; padding-bottom: 80px; }
        .bg-gradient-blue { background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%); }
    </style>
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="app-container">
    <div class="bg-gradient-blue p-6 text-white rounded-b-3xl shadow-lg">
        <div class="flex justify-between items-center mb-1">
            <h1 id="label-hari" class="text-lg font-semibold opacity-90 uppercase tracking-wide">Memuat...</h1>
            <p id="label-tanggal" class="text-xs opacity-70">-- --- ----</p>
        </div>
        <p class="text-sm opacity-80 uppercase tracking-tighter">Total Saldo</p>
        <h2 id="total-saldo" class="text-4xl font-bold mt-1">Rp 0</h2>
    </div>

    <div class="p-4 mt-4 grid grid-cols-2 gap-4">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
            <div class="bg-green-100 p-3 rounded-full text-green-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </div>
            <div>
                <p class="text-xs text-gray-400 uppercase">Pemasukan</p>
                <p id="total-pemasukan" class="text-green-600 font-bold text-lg">Rp 0</p>
            </div>
        </div>
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
            <div class="bg-red-100 p-3 rounded-full text-red-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 20V4m0 0l-4 4m4-4l4 4"></path></svg>
            </div>
            <div>
                <p class="text-xs text-gray-400 uppercase">Pengeluaran</p>
                <p id="total-pengeluaran" class="text-red-600 font-bold text-lg">Rp 0</p>
            </div>
        </div>
    </div>

    <div class="p-4 space-y-4">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-gray-800">Analisis Bulan Ini</h3>
                <span id="label-bulan-analisis" class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg uppercase">---</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="w-32 h-32"><canvas id="myChart"></canvas></div>
                <div class="flex-1 space-y-2">
                    <div>
                        <p id="teks-terbanyak" class="text-xs text-gray-500">Menganalisa...</p>
                        <p id="nilai-terbanyak" class="text-sm font-bold text-red-600">Rp 0</p>
                    </div>
                    <div class="pt-2 border-t border-gray-50">
                        <p class="text-[10px] text-gray-400 uppercase">Rata-rata Harian</p>
                        <p id="rata-rata-harian" class="text-sm font-semibold text-gray-800">Rp 0</p>
                    </div>
                </div>
            </div>
            <button onclick="window.exportWhatsApp()" class="w-full mt-4 bg-green-500 text-white py-2 rounded-xl text-xs font-bold hover:bg-green-600 transition flex items-center justify-center gap-2">
                Kirim Rekap ke WhatsApp
            </button>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-gray-800">Catatan Terbaru</h3>
            </div>
            <div id="daftar-transaksi" class="space-y-3 min-h-[100px]">
                <p class="text-center text-gray-400 py-10">Memuat data dari cloud...</p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-[480px] p-4 bg-[#f7f9fc] border-t border-gray-100 z-10">
        <button onclick="window.bukaModal()" class="w-full bg-blue-600 text-white py-3.5 rounded-2xl font-semibold shadow-lg">
            + Tambahkan Transaksi
        </button>
    </div>

    <div id="modal-form" class="fixed inset-0 bg-black/50 z-20 flex items-center justify-center p-4 hidden">
        <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-[380px] space-y-3">
            <h4 class="text-lg font-semibold text-gray-800">Tambah Transaksi</h4>
            <input type="number" id="nominal" placeholder="Nominal (Rp)" class="w-full p-3.5 rounded-xl border border-gray-200">
            <input type="text" id="keterangan" placeholder="Keterangan" class="w-full p-3.5 rounded-xl border border-gray-200">
            <div class="flex gap-2 pt-2">
                <button onclick="window.tambahKeCloud('pemasukan')" class="bg-green-500 text-white flex-1 py-3 rounded-xl font-bold">MASUK</button>
                <button onclick="window.tambahKeCloud('pengeluaran')" class="bg-red-500 text-white flex-1 py-3 rounded-xl font-bold">KELUAR</button>
            </div>
            <button onclick="window.tutupModal()" class="w-full text-center text-sm text-gray-400 py-1">Batal</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Konfigurasi Firebase Jamal
    const firebaseConfig = {
        apiKey: "AIzaSyAp-NRtvMwmC61OhYgFMjmU3-93mDMbc4k",
        authDomain: "dompetku-5387c.firebaseapp.com",
        projectId: "dompetku-5387c",
        storageBucket: "dompetku-5387c.firebasestorage.app",
        messagingSenderId: "1064193223000",
        appId: "1:1064193223000:web:a98bc529932323b02d5d2d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "transaksi");

    let transaksi = [];
    let myChart = null;

    // --- FUNGSI CORE (Gunakan window. agar dapat diakses HTML) ---

    window.tambahKeCloud = async (tipe) => {
        const nominal = document.getElementById('nominal').value;
        const keterangan = document.getElementById('keterangan').value;
        const tgl = new Date();

        if (!nominal || !keterangan) return alert("Isi semua data!");

        try {
            await addDoc(colRef, {
                id: Date.now(),
                tipe: tipe,
                nominal: parseInt(nominal),
                keterangan: keterangan,
                tanggal: tgl.toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' }),
                createdAt: tgl 
            });
            window.tutupModal();
        } catch (e) {
            alert("Gagal menyimpan data ke cloud!");
        }
    };

    window.hapusDariCloud = async (firestoreId) => {
        if (confirm("Hapus catatan ini?")) {
            try {
                await deleteDoc(doc(db, "transaksi", firestoreId));
            } catch (e) {
                alert("Gagal menghapus data!");
            }
        }
    };

    // Real-time listener: Otomatis update jika ada perubahan di Firebase
    onSnapshot(query(colRef, orderBy("id", "desc")), (snapshot) => {
        transaksi = snapshot.docs.map(doc => ({ ...doc.data(), firestoreId: doc.id }));
        updateTampilan();
    });

    function updateTampilan() {
        const daftar = document.getElementById('daftar-transaksi');
        let masuk = 0, keluar = 0;
        daftar.innerHTML = '';

        if (transaksi.length === 0) {
            daftar.innerHTML = '<p class="text-center text-gray-400 py-10">Belum ada catatan.</p>';
        }

        transaksi.forEach((item, index) => {
            if(item.tipe === 'pemasukan') masuk += item.nominal;
            else keluar += item.nominal;

            // Tampilkan hanya 5 transaksi terbaru di dashboard
            if (index < 5) {
                const warna = item.tipe === 'pemasukan' ? 'text-green-600' : 'text-red-600';
                const simbol = item.tipe === 'pemasukan' ? '+' : '-'; // Perbaikan variabel simbol

                daftar.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center py-3 mb-3">
                        <div class="flex-1">
                            <p class="font-medium text-gray-800">${item.keterangan}</p>
                            <p class="text-xs text-gray-400">${item.tanggal}</p>
                        </div>
                        <div class="text-right flex items-center gap-3">
                            <p class="${warna} font-semibold text-lg">${simbol} ${formatRupiah(item.nominal)}</p>
                            <button onclick="window.hapusDariCloud('${item.firestoreId}')" class="p-1.5 rounded-lg text-gray-300 hover:text-red-500 hover:bg-gray-50 transition">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    </div>`;
            }
        });

        document.getElementById('total-saldo').innerText = formatRupiah(masuk - keluar);
        document.getElementById('total-pemasukan').innerText = formatRupiah(masuk);
        document.getElementById('total-pengeluaran').innerText = formatRupiah(keluar);
        
        updateRealTimeTanggal();
        updateAnalisis(masuk, keluar);
    }

    // --- FUNGSI PENDUKUNG ---

    function formatRupiah(n) { return 'Rp ' + n.toLocaleString('id-ID'); }

    function updateRealTimeTanggal() {
        const skrg = new Date();
        document.getElementById('label-hari').innerText = new Intl.DateTimeFormat('id-ID', { weekday: 'long' }).format(skrg);
        document.getElementById('label-tanggal').innerText = new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }).format(skrg);
    }

    function updateAnalisis(totalMasuk, totalKeluar) {
        const skrg = new Date();
        document.getElementById('label-bulan-analisis').innerText = new Intl.DateTimeFormat('id-ID', { month: 'long' }).format(skrg);

        const keluarHanya = transaksi.filter(i => i.tipe === 'pengeluaran');
        if (keluarHanya.length > 0) {
            const terbesar = keluarHanya.reduce((prev, curr) => (prev.nominal > curr.nominal) ? prev : curr);
            document.getElementById('teks-terbanyak').innerText = "Terbesar: " + terbesar.keterangan;
            document.getElementById('nilai-terbanyak').innerText = "-" + formatRupiah(terbesar.nominal);
            document.getElementById('rata-rata-harian').innerText = formatRupiah(Math.round(totalKeluar / skrg.getDate())) + " / hari";
        }

        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: (totalMasuk === 0 && totalKeluar === 0) ? [1] : [totalMasuk, totalKeluar],
                    backgroundColor: (totalMasuk === 0 && totalKeluar === 0) ? ['#f3f4f6'] : ['#22c55e', '#ef4444'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '70%', plugins: { legend: { display: false } } }
        });
    }

    window.exportWhatsApp = () => {
        let pesan = `*REKAP KEUANGAN JAMAL*\nSaldo: ${document.getElementById('total-saldo').innerText}\n`;
        const link = `https://wa.me/?text=${encodeURIComponent(pesan)}`;
        window.open(link, '_blank');
    };

    window.bukaModal = () => document.getElementById('modal-form').classList.remove('hidden');
    window.tutupModal = () => {
        document.getElementById('modal-form').classList.add('hidden');
        document.getElementById('nominal').value = '';
        document.getElementById('keterangan').value = '';
    };
    
    // Registrasi PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("PWA: Service Worker Terdaftar!"))
                .catch((err) => console.log("PWA: Gagal!", err));
        });
    }
</script>
</body>
</html>
